<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errores Detectados</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(white 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: white;
            color: #1f2937;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #ef4444;
            color: white;
            padding: 30px 40px;
            text-align: center;
        }
        .header h1 { font-size: 26px; }
        .content { padding: 40px; }
        .error-list {
            list-style: none;
        }
        .error-item {
            padding: 14px 18px;
            background: #fef2f2;
            border-left: 5px solid #ef4444;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 15.5px;
        }
        .btn {
            width:100%; padding:16px; margin-top:20px; border:none; 
            border-radius:10px; font-size:17px; font-weight:600; cursor:pointer;
        }
        .btn-primary { background:#ef4444; color:white; }
        .btn-secondary { background:white; color:#374151; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚠️ Errores Detectados</h1>
        </div>
        <div class="content">
            <p style="margin-bottom:20px; color:#64748b;">Se encontraron los siguientes problemas en las pantallas anteriores:</p>
            
            <ul class="error-list" id="listaErrores">
                <!-- Se llenan con JavaScript -->
            </ul>

            <button class="btn btn-primary" onclick="volverAlRegistro()">Corregir en Registro</button>
            <button class="btn btn-secondary" onclick="volverAlLogin()">Volver al Login</button>
        </div>
    </div>

    <script>
        const errores = [
            "El correo electrónico ya se encuentra registrado.",
            "La cédula ingresada no tiene el formato correcto.",
            "La fecha de nacimiento indica que el usuario es menor de edad.",
            "La contraseña no cumple con los requisitos de seguridad."
        ];

        const lista = document.getElementById('listaErrores');
        
        errores.forEach(err => {
            const li = document.createElement('li');
            li.className = 'error-item';
            li.textContent = "• " + err;
            lista.appendChild(li);
        });

        function volverAlRegistro() {
            window.location.href = "registro.html";
        }
        
        function volverAlLogin() {
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
